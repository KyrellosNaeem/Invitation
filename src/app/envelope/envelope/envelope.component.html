<div
  class="envelope"
  [class.open]="isOpen"
  [class.scrolled]="scrollOffset > 0"
  (click)="toggleEnvelope()">

  <!-- Top flap -->
  <div class="flap">
    <div class="flap-body">
    </div>
    <div class="stamp"></div>
  </div>

  <!-- Body sides -->
  <div class="body">
    <div class="flap-text-wrapper" [style.--scroll]="scrollOffset * 0.8 + 'px'">
      <div class="flap-text-container">
        <div class="flap-text">To our {{dear}}\</div>
        <div class="flap-text-name">{{ guestName }}</div>
      </div>
    </div>
    <div class="left-side" [style.--scroll]="scrollOffset * 0.8 + 'px'"></div>
    <div class="right-side" [style.--scroll]="scrollOffset * 0.8 + 'px'"></div>
  </div>

  <!-- Scrollable invitation content -->
  <div class="invitation-wrapper" *ngIf="showInvitation" (click)="$event.stopPropagation()" (scroll)="onScroll($event)">
    <app-invitation-body
      [guestCode]="guestCode"
      [receptionParam]="receptionParam"
      (guestNameResolved)="onGuestNameResolved($event)">
    </app-invitation-body>
  </div>

</div>
